# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # يتيح لك تشغيل البوت يدوياً من واجهة GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # تثبيت الأدوات الضرورية لنظام البناء التي تطلبها مكتبات الصوت
        sudo apt-get update
        sudo apt-get install -y build-essential ffmpeg libffi-dev libssl-dev
        
        # تثبيت المكتبات الأساسية مباشرة لتجاوز مشاكل تعارض الإصدارات في requirements.txt
        pip install telethon pytgcalls pyrogram python-telegram-bot
        
        # تثبيت باقي المتطلبات إذا وجدت
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Run Bot
      run: |
        # تشغيل ملف البوت الرئيسي
        python main.py
